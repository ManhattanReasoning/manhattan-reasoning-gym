name: publish

# Build and publish to PyPI on a version tag (e.g. v0.1.0), using PyPI
# Trusted Publishing (OIDC) — no API token stored in the repo. One-time setup:
# on PyPI, add a trusted publisher for this repo + workflow (publish.yml),
# environment "pypi".
on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
